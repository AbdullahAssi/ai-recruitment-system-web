name: Build and Deploy Next.js via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USERNAME }}
          key: ${{ secrets.TARGET_KEY }}
          timeout: 35m
          command_timeout: 40m
          script: |
            set -e
            cd ~/fyp

            # Update .env file with secrets
            cat > .env.nextjs << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_FASTAPI_URL=http://fastapi:8000/api/v1
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            FROM_NAME=${{ secrets.FROM_NAME }}
            EOF

            cat .env.nextjs >> .env
            rm .env.nextjs

            cd ~/fyp
            if [ -d "ai-recruitment-system-web/.git" ]; then
                cd ai-recruitment-system-web
                # Ensure we are using SSH remote 
                git remote set-url origin git@github.com:AbdullahAssi/ai-recruitment-system-web.git
                git fetch origin
                git reset --hard origin/main
            else
                git clone git@github.com:AbdullahAssi/ai-recruitment-system-web.git
                cd ai-recruitment-system-web
            fi

            # Rebuild and restart Next.js
            cd ~/fyp
            # Fix uppercase image names in docker-compose file
            sed -i 's/AbdullahAssi\//abdullahassi\//g' docker-compose.prod.yml

            # Clean up Docker storage to prevent mount callback failures
            docker system prune -f --volumes || true
            sleep 5
            docker builder prune -f || true

            # Build with timeout to prevent hanging
            timeout 600 docker-compose -f docker-compose.prod.yml stop nextjs || true
            docker-compose -f docker-compose.prod.yml rm -f nextjs || true

            # Build with progress output and timeout
            timeout 1200 docker-compose -f docker-compose.prod.yml build --no-cache nextjs
            docker-compose -f docker-compose.prod.yml up -d nextjs
            sleep 10
            docker-compose -f docker-compose.prod.yml ps nextjs

      - name: Cleanup old images
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USERNAME }}
          key: ${{ secrets.TARGET_KEY }}
          script: |
            docker image prune -f
