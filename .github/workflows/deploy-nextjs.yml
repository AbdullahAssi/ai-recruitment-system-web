name: Deploy Next.js to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cv-jd-nextjs

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USERNAME }}
          key: ${{ secrets.TARGET_KEY }}
          script: |
            # Navigate to deployment directory
            cd ~/cv-jd-deployment || exit 1

            # Update .env file with secrets
            cat > .env.nextjs << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_FASTAPI_URL=http://fastapi:8000/api/v1
            NODE_ENV=production
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            FROM_NAME=${{ secrets.FROM_NAME }}
            EOF

            # Merge with main .env file
            cat .env.nextjs >> .env
            rm .env.nextjs

            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest Next.js image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Run database migrations
            docker-compose -f docker-compose.prod.yml run --rm nextjs npx prisma migrate deploy

            # Restart Next.js container
            docker-compose -f docker-compose.prod.yml up -d nextjs

            # Wait for health check
            echo "Waiting for Next.js to be healthy..."
            sleep 10

            # Verify deployment
            docker-compose -f docker-compose.prod.yml ps nextjs

            # Check health
            if docker-compose -f docker-compose.prod.yml exec -T nextjs wget -q -O- http://localhost:3000/api/health; then
              echo "✅ Next.js deployment successful!"
            else
              echo "❌ Next.js health check failed!"
              docker-compose -f docker-compose.prod.yml logs --tail=50 nextjs
              exit 1
            fi

      - name: Cleanup
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USERNAME }}
          key: ${{ secrets.TARGET_KEY }}
          script: |
            # Remove old/dangling images
            docker image prune -f
